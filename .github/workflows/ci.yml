name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # Speed up subsequent runs by caching cargo registry + target.
  RUSTFLAGS: "-D warnings"

jobs:
  rust:
    name: cargo test + clippy + fmt + coverage (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.100.0
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy, llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: fmt check
        run: cargo fmt --all -- --check

      - name: clippy (all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: test
        run: cargo test --workspace

      - name: Install cargo-llvm-cov
        if: matrix.os != 'windows-latest'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov@0.8.5

      - name: Coverage ≥ 85%
        if: matrix.os != 'windows-latest'
        run: cargo llvm-cov --workspace --fail-under-lines 85 --summary-only

  python:
    name: pytest + mypy + ruff (${{ matrix.os }}, py${{ matrix.python }})
    needs: rust  # Rust must compile before maturin develop is meaningful.
    strategy:
      fail-fast: false
      matrix:
        # POSIX venvs put python at `.venv/bin/python`; Windows venvs
        # put it at `.venv/Scripts/python.exe`. Pre-compute the right
        # path per-OS via `include` so every step can just call
        # `${{ matrix.venv_py }}` without branching at runtime.
        include:
          - os: ubuntu-latest
            python: "3.11"
            venv_py: .venv/bin/python
          - os: ubuntu-latest
            python: "3.12"
            venv_py: .venv/bin/python
          - os: ubuntu-latest
            python: "3.13"
            venv_py: .venv/bin/python
          - os: macos-latest
            python: "3.11"
            venv_py: .venv/bin/python
          - os: macos-latest
            python: "3.12"
            venv_py: .venv/bin/python
          - os: macos-latest
            python: "3.13"
            venv_py: .venv/bin/python
          - os: windows-latest
            python: "3.11"
            venv_py: .venv/Scripts/python.exe
          - os: windows-latest
            python: "3.12"
            venv_py: .venv/Scripts/python.exe
          - os: windows-latest
            python: "3.13"
            venv_py: .venv/Scripts/python.exe
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash  # force bash on Windows too; avoids pwsh syntax mismatches.
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.100.0
        with:
          toolchain: "1.95.0"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Create venv and install shadow (with dev extras)
        run: |
          uv venv --python ${{ matrix.python }} .venv
          uv pip install --python "${{ matrix.venv_py }}" -e "python[dev]"

      - name: Build PyO3 extension
        env:
          VIRTUAL_ENV: ${{ github.workspace }}/.venv
        run: |
          cd python
          "../${{ matrix.venv_py }}" -m maturin develop --features extension --release

      - name: ruff check
        run: "${{ matrix.venv_py }} -m ruff check python/ examples/"

      - name: ruff format --check
        run: "${{ matrix.venv_py }} -m ruff format --check python/ examples/"

      - name: mypy --strict
        run: |
          ${{ matrix.venv_py }} -m mypy --config-file python/pyproject.toml --strict python/src examples/demo/agent.py examples/demo/generate_fixtures.py
          ${{ matrix.venv_py }} -m mypy --config-file python/pyproject.toml --strict examples/stress/run_stress.py

      - name: pytest (coverage gate 85%)
        run: |
          "${{ matrix.venv_py }}" -m pytest python/tests \
            --cov=shadow --cov-config=python/pyproject.toml --cov-fail-under=85 \
            --cov-report=term-missing

      # Statistical-property simulations are marked @pytest.mark.slow so
      # they don't run in the fast inner loop. Run them here on one
      # matrix entry (Ubuntu, Python 3.12) so regressions in Type-I rate,
      # power, or always-valid bounds are caught on every push without
      # multiplying the matrix by all OS×Python combinations.
      - name: pytest -m slow (statistical-property validation)
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.12'
        run: |
          "${{ matrix.venv_py }}" -m pytest python/tests/test_statistical_validation.py -m slow -v

  python-full-extras:
    name: pytest (all optional extras installed, no skips)
    needs: python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.100.0
        with:
          toolchain: "1.95.0"

      - uses: Swatinem/rust-cache@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install shadow with every optional extra
        run: |
          uv venv --python 3.11 .venv
          # Core extras + provider SDKs + observability + serve.
          uv pip install --python .venv/bin/python \
            -e "python[dev,anthropic,openai,otel,serve,mcp]"
          # `embeddings` pulls sentence-transformers (~500 MB with
          # torch), so it's in its own install step to keep the output
          # legible if that step ever times out.
          uv pip install --python .venv/bin/python \
            -e "python[embeddings]"
          # Framework adapters. Each pulls a different ecosystem
          # (langgraph + langchain-openai, crewai, autogen via ag2).
          # Split per extra so a flake in one doesn't mask the others.
          uv pip install --python .venv/bin/python \
            -e "python[langgraph]"
          uv pip install --python .venv/bin/python \
            -e "python[crewai]"
          uv pip install --python .venv/bin/python \
            -e "python[ag2]"
          # `multimodal` is Pillow + imagehash for the v0.2 blob_ref
          # cheap-tier dHash. Quiet on the test side until installed,
          # so it belongs in the all-extras job.
          uv pip install --python .venv/bin/python \
            -e "python[multimodal]"
          # `sign` pulls sigstore which carries pre-release deps
          # (sigstore-rekor-types, sigstore-protobuf-specs). Needs
          # --prerelease=allow. Same flag the local ci-local-extras
          # recipe uses; this CI job mirrors it now.
          uv pip install --python .venv/bin/python --prerelease=allow \
            -e "python[sign]"

      - name: Build PyO3 extension
        run: |
          cd python
          VIRTUAL_ENV=${{ github.workspace }}/.venv \
            ../.venv/bin/maturin develop --features extension --release

      - name: pytest (every test runs — only live-API tests skip)
        run: |
          # SHADOW_RUN_NETWORK_TESTS stays unset on purpose: live-API
          # tests need real keys, which CI doesn't carry.
          .venv/bin/python -m pytest python/tests -v \
            --ignore=python/tests/test_judge_live.py

  demo:
    name: end-to-end demo (<10s wall-clock)
    needs: python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.100.0
        with:
          toolchain: "1.95.0"

      - uses: Swatinem/rust-cache@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Bootstrap
        run: |
          uv venv --python 3.11 .venv
          uv pip install --python .venv/bin/python -e "python[dev]"
          cd python
          VIRTUAL_ENV=${{ github.workspace }}/.venv \
            ../.venv/bin/maturin develop --features extension --release

      - name: Run demo (timeout 30s — demo.sh targets <10s)
        run: timeout 30 bash examples/demo/demo.sh

  typescript:
    name: typescript build + typecheck + vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: typescript/package-lock.json

      - name: install
        working-directory: typescript
        run: npm ci

      - name: typecheck
        working-directory: typescript
        run: npm run typecheck

      - name: build
        working-directory: typescript
        run: npm run build

      - name: test
        working-directory: typescript
        run: npm test
