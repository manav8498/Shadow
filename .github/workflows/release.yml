name: release

# Triggered by pushing a tag matching v*. Builds signed artifacts for all
# three language targets, generates CycloneDX SBOMs, and signs with sigstore
# cosign (keyless via OIDC). Enterprise reviewers get:
#   - .tar.gz / .whl / .tgz artifacts
#   - <artifact>.sig + <artifact>.crt (sigstore attestations)
#   - sbom-<component>.cdx.json (CycloneDX 1.5)
#   - GitHub release with SLSA provenance attached

on:
  # Two trigger paths, both end at the same publish chain:
  #   1. `push` of a `v*` tag — used when a maintainer cuts a release
  #      manually with `git tag -a vX.Y.Z`.
  #   2. `release: published` — fired when release-please merges its
  #      release PR and creates a GitHub Release (the default
  #      automated path; see `release-please.yml`). Required because
  #      tag pushes from GITHUB_TOKEN don't cascade into other
  #      workflows, but release-published events do.
  push:
    tags:
      - "v*"
  release:
    types: [published]
  # Allow manual invocation for dry-runs.
  workflow_dispatch:

# Minimum permissions needed for keyless sigstore signing + SLSA provenance.
permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  # ----------------------------------------------------------------------
  # Python wheel (maturin → Linux/macOS/Windows via release artifacts)
  # ----------------------------------------------------------------------
  python-wheel:
    name: build python wheel (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # On macos-latest the pre-installed Xcode toolchain ships its own
      # `cargo-clippy` binary; when dtolnay/rust-toolchain reads our
      # `rust-toolchain.toml` and tries to add the `clippy` component,
      # rustup refuses to overwrite the existing binary and the wheel
      # build fails. The wheel build only needs `cargo` + `rustc`, so
      # on macOS we substitute a minimal toolchain.toml for the duration
      # of the job. Linux + Windows are unaffected; their toml is the
      # original.
      - name: Strip clippy/rustfmt from toolchain on macOS
        if: matrix.os == 'macos-latest'
        run: |
          cat > rust-toolchain.toml <<'EOF'
          [toolchain]
          channel = "1.95.0"
          profile = "minimal"
          EOF

      - uses: dtolnay/rust-toolchain@1.95.0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv + maturin
        run: |
          pip install maturin==1.13.1 cyclonedx-bom==5.0.0

      - name: Build wheel
        run: |
          cd python
          maturin build --release --out dist/

      - name: Generate Python SBOM (CycloneDX)
        # Only produce the SBOM from the ubuntu runner. Python deps
        # are identical across OS matrix entries, so a single SBOM is
        # authoritative — and avoids the upload collision that would
        # otherwise happen when three matrix jobs try to attach a
        # file with the same name to the same GitHub release.
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          cyclonedx-py environment -o python/dist/sbom-python.cdx.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel-${{ matrix.os }}
          path: |
            python/dist/*.whl
            python/dist/sbom-python.cdx.json
          # SBOM is only present on the ubuntu runner; silence the
          # warning on the other two.
          if-no-files-found: ignore

  # ----------------------------------------------------------------------
  # Python sdist — single source distribution that pip falls back to on
  # platforms without a published wheel (Intel Mac, ARM Linux, older
  # glibc, Alpine, FreeBSD). Requires Rust on the user's machine to
  # build, but unblocks `pip install shadow-diff` everywhere.
  # ----------------------------------------------------------------------
  python-sdist:
    name: build python sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install maturin
        run: pip install maturin==1.13.1
      - name: Build sdist
        run: |
          cd python
          maturin sdist --out dist/
          ls -la dist/
      - uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: python/dist/*.tar.gz

  # ----------------------------------------------------------------------
  # TypeScript package (npm)
  # ----------------------------------------------------------------------
  ts-package:
    name: build typescript package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: |
          cd typescript
          npm ci
      - name: Typecheck + test
        run: |
          cd typescript
          npm run typecheck
          npm test
      - name: Build + pack
        run: |
          cd typescript
          npm run build
          npm pack

      # Publish to npm registry. Gated on NPM_TOKEN being set, so this
      # step is a no-op for forks and contributors who don't own the
      # `shadow-diff` package. The actual publish requires the token to
      # have been provisioned in repo Settings → Secrets.
      #
      # Surfaces a loud `::warning` when NPM_TOKEN is missing on a
      # release tag push so a missed publish doesn't read as silent
      # success (it used to be `if: env.NPM_TOKEN != ''` which made the
      # whole step disappear from the run summary).
      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd typescript
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "::warning title=npm publish skipped::NPM_TOKEN is not set. Add the secret in Settings -> Secrets and variables -> Actions to enable automatic npm publishing."
            exit 0
          fi
          # Skip if this version is already on npm (idempotent reruns).
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if npm view "$PKG@$VER" version 2>/dev/null; then
            echo "$PKG@$VER already on npm — skipping publish."
          else
            echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
            npm publish --access public
          fi

      - name: Generate npm SBOM (CycloneDX)
        run: |
          cd typescript
          npx -y @cyclonedx/cyclonedx-npm --output-file sbom-typescript.cdx.json
      - name: Upload TS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ts-package
          path: |
            typescript/*.tgz
            typescript/sbom-typescript.cdx.json

  # ----------------------------------------------------------------------
  # Rust crate (source, checksummed)
  # ----------------------------------------------------------------------
  rust-crate:
    name: build rust source tarball
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
      - name: Package
        run: |
          cargo package -p shadow-diff --allow-dirty
      - name: Generate Rust SBOM (CycloneDX)
        run: |
          cargo install cargo-cyclonedx --version 0.5.7 --locked
          # `cargo cyclonedx` 0.5.7 writes to `<crate>.cdx.json` in each
          # crate dir by default. The `--output-pattern` flag we used
          # earlier was removed upstream and failed the job.
          cargo cyclonedx --format json
          ls crates/shadow-core/
          # If cargo-cyclonedx's output path shifts in a future release,
          # emit a VALID minimal CycloneDX 1.5 document instead of
          # garbage JSON — Dependency-Track and similar ingestors reject
          # anything that isn't schema-valid. cargo-cyclonedx names the
          # output file after the crate's `[package] name`, which is now
          # `shadow-diff`.
          cp crates/shadow-core/shadow-diff.cdx.json sbom-rust.cdx.json || \
            printf '%s' '{"bomFormat":"CycloneDX","specVersion":"1.5","version":1,"components":[],"metadata":{"component":{"type":"library","name":"shadow-diff"}}}' \
              > sbom-rust.cdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: rust-crate
          path: |
            target/package/*.crate
            sbom-rust.cdx.json

  # ----------------------------------------------------------------------
  # Sign + release — gather all artifacts, sign with sigstore, publish.
  # ----------------------------------------------------------------------
  sign-and-release:
    name: sigstore-sign + gh release
    needs: [python-wheel, python-sdist, ts-package, rust-crate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign every artifact (keyless via OIDC)
        run: |
          find release-artifacts -type f \( -name "*.whl" -o -name "*.tar.gz" -o -name "*.tgz" -o -name "*.crate" \) | while read f; do
            cosign sign-blob --yes "$f" --output-signature "$f.sig" --output-certificate "$f.crt"
          done

      - name: Attach SLSA build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            release-artifacts/**/*.whl
            release-artifacts/**/*.tar.gz
            release-artifacts/**/*.tgz
            release-artifacts/**/*.crate

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release-artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: false

  # ----------------------------------------------------------------------
  # Publish to PyPI via OIDC Trusted Publisher (no API token required).
  # Requires one-time setup on pypi.org — see docs/PYPI-PUBLISHING.md.
  # ----------------------------------------------------------------------
  publish-pypi:
    name: publish Python wheels + sdist to PyPI
    needs: [python-wheel, python-sdist, sign-and-release]
    # Only run on real tag pushes. workflow_dispatch is for dry runs
    # that must never accidentally publish.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    # Binds this job to the `pypi` GitHub Environment. The trusted
    # publisher on PyPI is registered against (owner, repo, workflow,
    # environment) — changing any of those four fields breaks the
    # trust link on purpose, so tokenless publish still requires a
    # deliberate config change to reroute.
    environment:
      name: pypi
      url: https://pypi.org/p/shadow-diff
    permissions:
      # OIDC token that PyPI exchanges for a short-lived upload token.
      # No long-lived API token is stored anywhere.
      id-token: write
    steps:
      - name: Download all per-OS wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: python-wheel-*
          path: wheels
          merge-multiple: true

      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: python-sdist
          path: sdist

      - name: Collect wheels + sdist into dist/
        run: |
          mkdir -p dist
          # Only copy .whl files; the SBOM .json files ride alongside
          # the artifacts but don't belong on PyPI.
          find wheels -name "*.whl" -exec cp {} dist/ \;
          # Include the source distribution so pip can fall back to
          # building from source on platforms without a published wheel.
          find sdist -name "*.tar.gz" -exec cp {} dist/ \;
          echo "Artifacts to publish:"
          ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # Don't fail a re-run if the version is already on PyPI
          # (e.g. after a re-tag fix). Fresh tags publish normally.
          skip-existing: true

  publish-crates:
    name: publish shadow-diff to crates.io
    needs: [rust-crate, sign-and-release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    # Gated on the CARGO_REGISTRY_TOKEN repo secret being present. If
    # the secret isn't configured, this step emits a noop message and
    # exits clean so the release pipeline still succeeds overall. The
    # conditional guard means maintainers can enable crates.io
    # publishing by adding the secret — no workflow change needed.
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Publish (or skip if token missing)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "::warning title=crates.io publish skipped::CARGO_REGISTRY_TOKEN is not set. Add the secret in Settings -> Secrets and variables -> Actions to enable automatic crates.io publishing."
            exit 0
          fi
          # --allow-dirty tolerates the artifacts/ dir from earlier jobs;
          # the Cargo.toml state at the tagged commit is what gets published.
          cargo publish -p shadow-diff --allow-dirty
