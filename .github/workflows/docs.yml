name: docs

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs
  cancel-in-progress: false

jobs:
  build:
    name: build mkdocs site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install mkdocs-material
        run: pip install "mkdocs-material>=9.5,<10"

      - name: Sync root → docs/ copies
        # docs/changelog.md and docs/security.md are published to the
        # mkdocs site; we keep canonical copies at repo root so tools
        # like GitHub's security-advisory tab and PyPI's readme point
        # at `./SECURITY.md` and `./CHANGELOG.md`. This step just
        # mirrors root → docs/ so the site never goes stale.
        run: |
          cp CHANGELOG.md docs/changelog.md
          cp SECURITY.md docs/security.md

      - name: Build site
        run: mkdocs build --strict

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    name: deploy to GitHub Pages
    # Only deploy from main (PRs just build-verify).
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
