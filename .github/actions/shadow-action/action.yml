name: 'Shadow behavioral diff'
description: 'Post a nine-axis behavioral diff of LLM agent traces on every PR. Optionally gate the merge on severity.'

inputs:
  baseline:
    description: 'Path to the baseline .agentlog file (committed to the repo).'
    required: true
  candidate:
    description: 'Path to the candidate .agentlog file (produced in CI, or another committed fixture).'
    required: true
  pricing:
    description: 'Path to a JSON pricing table (dict of model → [input, output] USD/token). Optional.'
    required: false
    default: ''
  policy:
    description: 'Path to a YAML policy overlay to check both traces against. Optional. Policy regressions count toward the merge gate when fail-on is set.'
    required: false
    default: ''
  fail-on:
    description: 'Exit non-zero (failing the action and blocking merge if the check is required) when the worst axis severity or policy violation reaches this level. One of: never, minor, moderate, severe. Default: never (post the comment, do not block).'
    required: false
    default: 'never'
  harness-diff:
    description: 'Append a harness-event diff section (retry, rate_limit, model_switch, ...) to the rendered PR comment. Set to "true" to enable. Requires harness_event records in both traces.'
    required: false
    default: 'false'
  multimodal-diff:
    description: 'Append a multimodal blob diff section (cheap-tier dHash + semantic-tier cosine) to the rendered PR comment. Set to "true" to enable. Requires blob_ref records in both traces.'
    required: false
    default: 'false'
  python-version:
    description: 'Python version to install for running shadow.'
    required: false
    default: '3.11'
  shadow-version:
    description: 'Pin a specific shadow-diff version. Empty installs the latest.'
    required: false
    default: ''
  github-token:
    description: 'GitHub token for posting the PR comment. Defaults to ${{ github.token }}.'
    required: false
    default: ${{ github.token }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install shadow
      shell: bash
      run: |
        set -euxo pipefail
        python -m pip install --upgrade pip
        # Action consumers install shadow-diff from PyPI. The fallback
        # below is only for in-tree dogfooding from inside this repo —
        # it builds the PyO3 extension and therefore needs cargo +
        # rustc available. GitHub-hosted runners ship Rust by default
        # so this works in CI; a self-hosted runner without Rust would
        # need to install it before invoking this action with an
        # unpublished shadow-version.
        if [[ -n "${{ inputs.shadow-version }}" ]]; then
          PKG="shadow-diff==${{ inputs.shadow-version }}"
        else
          PKG="shadow-diff"
        fi
        python -m pip install "$PKG" || {
          echo "$PKG not on PyPI; falling back to in-tree source install (requires cargo + rustc)" >&2
          if ! command -v cargo >/dev/null 2>&1; then
            echo "error: cargo not found on PATH; the in-tree fallback builds the PyO3 extension and needs Rust." >&2
            echo "hint: add 'uses: dtolnay/rust-toolchain@stable' before this action, or install shadow-diff from PyPI." >&2
            exit 1
          fi
          cd ${{ github.action_path }}/../../..
          python -m pip install -e python/
        }

    - name: Compute diff
      shell: bash
      id: diff
      run: |
        set -euxo pipefail
        PRICING_ARG=""
        if [[ -n "${{ inputs.pricing }}" ]]; then
          PRICING_ARG="--pricing ${{ inputs.pricing }}"
        fi
        POLICY_ARG=""
        if [[ -n "${{ inputs.policy }}" ]]; then
          POLICY_ARG="--policy ${{ inputs.policy }}"
        fi
        EXTRA_ARGS=""
        if [[ "${{ inputs.harness-diff }}" == "true" ]]; then
          EXTRA_ARGS="$EXTRA_ARGS --harness-diff"
        fi
        if [[ "${{ inputs.multimodal-diff }}" == "true" ]]; then
          EXTRA_ARGS="$EXTRA_ARGS --multimodal-diff"
        fi
        mkdir -p .shadow-action
        # Run the diff first WITHOUT --fail-on so the comment-rendering
        # steps always have a report.json. The gate runs as a separate
        # step at the end so the PR still gets a comment explaining why
        # the merge was blocked.
        shadow diff "${{ inputs.baseline }}" "${{ inputs.candidate }}" \
          $PRICING_ARG $POLICY_ARG $EXTRA_ARGS \
          --output-json .shadow-action/report.json

    - name: Render markdown for PR comment
      shell: bash
      run: |
        set -euxo pipefail
        shadow report .shadow-action/report.json --format github-pr \
          > .shadow-action/comment.md
        # Also write to the step summary so logs-only runs still see it.
        cat .shadow-action/comment.md >> "$GITHUB_STEP_SUMMARY"

    - name: Post or update PR comment
      if: github.event_name == 'pull_request'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euxo pipefail
        python ${{ github.action_path }}/comment.py \
          --repo "${{ github.repository }}" \
          --pr "${{ github.event.number }}" \
          --body-file .shadow-action/comment.md \
          --marker "shadow-behavioral-diff"

    - name: Gate merge on severity
      shell: bash
      run: |
        set -euxo pipefail
        if [[ "${{ inputs.fail-on }}" == "never" ]]; then
          echo "fail-on=never; not gating merge."
          exit 0
        fi
        # Re-run shadow diff with --fail-on to surface the gate decision
        # as a non-zero exit. The comment was already posted above, so
        # blocked PRs still see the explanation. Passes through every
        # opt-in surface from the report run so the gate sees the same
        # axes the comment shows.
        PRICING_ARG=""
        if [[ -n "${{ inputs.pricing }}" ]]; then
          PRICING_ARG="--pricing ${{ inputs.pricing }}"
        fi
        POLICY_ARG=""
        if [[ -n "${{ inputs.policy }}" ]]; then
          POLICY_ARG="--policy ${{ inputs.policy }}"
        fi
        EXTRA_ARGS=""
        if [[ "${{ inputs.harness-diff }}" == "true" ]]; then
          EXTRA_ARGS="$EXTRA_ARGS --harness-diff"
        fi
        if [[ "${{ inputs.multimodal-diff }}" == "true" ]]; then
          EXTRA_ARGS="$EXTRA_ARGS --multimodal-diff"
        fi
        shadow diff "${{ inputs.baseline }}" "${{ inputs.candidate }}" \
          $PRICING_ARG $POLICY_ARG $EXTRA_ARGS \
          --fail-on "${{ inputs.fail-on }}" \
          > /dev/null
