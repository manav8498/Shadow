# Candidate config — three atomic changes from config_a:
#   1. prompt.system wording (shorter, less directive)
#   2. params.temperature: 0.2 → 0.7 (more sampling variance)
#   3. tools[0].input_schema adds an optional `limit: int` parameter
#
# Shadow bisect attributes each nine-axis divergence back to one of these
# three deltas.
model: claude-opus-4-7
params:
  temperature: 0.7
  top_p: 1.0
  max_tokens: 512
prompt:
  system: |
    You are a code reviewer. Use `search_files` if needed.
tools:
  - name: search_files
    description: "Search for files matching a glob."
    input_schema:
      type: object
      properties:
        query:
          type: string
          description: "Glob pattern like '*.rs' or 'src/**/*.py'."
        limit:
          type: integer
          description: "Max number of results (optional)."
      required: [query]
